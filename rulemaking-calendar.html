  .header { border-bottom: 1px solid #1A1A1A; background: #FAF8F3; }

    gap: 0.75rem;
    margin-bottom: 0.5rem;
  }
  .masthead-meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.75rem;
    text-transform: uppercase;

    color: #737373;

  .masthead-rule { flex: 1; height: 1px; background: #1A1A1A; }
  .title {
    font-family: 'IBM Plex Serif', Georgia, serif;
    font-weight: 700;
    font-size: 2.75rem;
    line-height: 1.05;
    letter-spacing: -0.02em;
    color: #1A1A1A;
    margin: 0;
  }
  .subtitle {
    margin: 0.75rem 0 0;
    font-size: 1rem;
    color: #525252;
    font-family: 'IBM Plex Serif', Georgia, serif;
    font-style: italic;
  }

  .stats-strip { border-bottom: 1px solid #E5E1D7; background: #1A1A1A; }
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
    padding: 1.25rem 0;
  }

  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: #A3A3A3;

  }

    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
  }
  .stat-sub {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: #A3A3A3;
    text-transform: uppercase;
    letter-spacing: 0.1em;

    gap: 0.5rem;

    border: none;
    cursor: pointer;
    color: #1A1A1A;
    font-family: 'IBM Plex Mono', monospace;

    padding: 0;
    font-size: 0.75rem;
    text-decoration: underline;
    color: #737373;

  .month-header {
    display: flex;

    gap: 1rem;
    margin-bottom: 1.25rem;
    padding-bottom: 0.5rem;
    border-bottom: 2px solid #1A1A1A;

    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function getFiltered() {
  return EVENTS.filter(e => {
    if (state.selectedAgencies.size > 0 && !state.selectedAgencies.has(e.agency)) return false;
    if (state.selectedConf.size > 0 && !state.selectedConf.has(e.confidence)) return false;
    if (state.query) {
      const q = state.query.toLowerCase();
      if (!e.title.toLowerCase().includes(q) && !e.detail.toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function getByMonth(filtered) {
  const m = {};
  MONTHS.forEach(month => { m[month] = []; });
  filtered.forEach(e => { m[e.month].push(e); });
  MONTHS.forEach(month => {
    m[month].sort((a, b) => a.sortKey.localeCompare(b.sortKey));
  });
  return m;
}

function getStats(filtered) {
  const byAgency = {};
  Object.keys(AGENCIES).forEach(a => byAgency[a] = 0);
  filtered.forEach(e => byAgency[e.agency]++);
  return {
    total: filtered.length,
    byAgency,
    highConf: filtered.filter(e => e.confidence === 'High').length,
  };
}

function hasFilters() {
  return state.selectedAgencies.size > 0 || state.selectedConf.size > 0 || !!state.query;
}

// ============ RENDER PARTS ============
function statBox(label, value, accent, sub) {
  return `
    <div>
      <div class="stat-label">${esc(label)}</div>
      <div class="stat-value-row">
        <div class="stat-value" style="color: ${accent};">${esc(value)}</div>
        ${sub ? `<div class="stat-sub">${esc(sub)}</div>` : ''}
      </div>
    </div>
  `;
}

function chipsBlock() {
  const agencyChips = Object.entries(AGENCIES).map(([key, a]) => {
    const active = state.selectedAgencies.has(key);
    const style = `background: ${active ? a.color : a.tint}; color: ${active ? '#FAF8F3' : a.color}; border-color: ${a.color};`;
    return `<button class="chip" data-agency="${esc(key)}" style="${style}">${esc(a.name)}</button>`;
  }).join('');

  const confChips = Object.entries(CONFIDENCE).map(([key, c]) => {
    const active = state.selectedConf.has(key);
    const style = `background: ${active ? c.color : c.bg}; color: ${active ? '#FFFFFF' : c.color}; border-color: ${c.color};`;
    return `<button class="chip" data-conf="${esc(key)}" style="${style}">${esc(c.label)}</button>`;
  }).join('');

  return `
    <div>
      <div class="filter-section-label">Agency</div>
      <div class="chip-row">${agencyChips}</div>
    </div>
    <div>
      <div class="filter-section-label">Confidence</div>
      <div class="chip-row">${confChips}</div>
    </div>
  `;
}

function filtersBlock() {
  const active = hasFilters();
  const activeCount = state.selectedAgencies.size + state.selectedConf.size + (state.query ? 1 : 0);

  return `
    <div class="filter-block">
      <button class="filter-toggle" data-action="toggle-filters">
        ${ICON.filter}
        <span>Filters</span>
        ${state.showFilters ? ICON.chevronDown : ICON.chevronRight}
        ${active ? `<span class="filter-toggle-count">${activeCount} active</span>` : ''}
      </button>

      ${state.showFilters ? `
        <div class="filters-body">
          <div class="search-wrap">
            <span class="search-icon">${ICON.search}</span>
            <input
              id="search-input"
              type="text"
              class="search-input"
              placeholder="Search rules, agencies, topics\u2026"
              value="${esc(state.query)}"
            >
            ${state.query ? `<button class="search-clear" data-action="clear-search" aria-label="Clear search">${ICON.x}</button>` : ''}
          </div>
          ${chipsBlock()}
          ${active ? `<button class="clear-link" data-action="clear-all">Clear all filters</button>` : ''}
        </div>
      ` : ''}
    </div>
  `;
}

function eventArticle(ev) {
  const agency = AGENCIES[ev.agency];
  const conf = CONFIDENCE[ev.confidence];
  const isExpanded = state.expandedId === ev.id;
  const classes = ['event'];
  if (isExpanded) classes.push('is-expanded');

  return `
    <article class="${classes.join(' ')}" data-event-id="${ev.id}">
      <div class="event-row">
        <div class="event-date">${esc(ev.date)}</div>
        <div class="event-agency-cell">
          <span class="event-agency" style="background: ${agency.color};">${esc(agency.name)}</span>
        </div>
        <div class="event-body">
          <h3 class="event-title">${esc(ev.title)}</h3>
          ${isExpanded ? `<p class="event-detail">${esc(ev.detail)}</p>` : ''}
        </div>
        <div class="event-conf">
          <span class="conf-badge" style="background: ${conf.bg}; color: ${conf.color};">${esc(conf.label)}</span>
        </div>
      </div>
      <div class="event-conf-mobile">
        <span class="conf-badge" style="background: ${conf.bg}; color: ${conf.color};">${esc(conf.label)}</span>
      </div>
    </article>
  `;
}

function monthSection(month, items) {
  if (items.length === 0) return '';
  return `
    <section class="month-section">
      <div class="month-header">
        <h2 class="month-title">${esc(month)}</h2>
        <span class="month-meta">2026 \u00b7 ${items.length} ${items.length === 1 ? 'item' : 'items'}</span>
      </div>
      <div>${items.map(eventArticle).join('')}</div>
    </section>
  `;
}

function emptyState() {
  return `
    <div class="empty-state">
      <div class="empty-icon">${ICON.alert}</div>
      <p class="empty-text">No items match your filters.</p>
      <button class="empty-reset" data-action="clear-all">Clear filters</button>
    </div>
  `;
}

function footerBlock() {
  return `
    <footer class="footer">
      <p>
        <span class="footer-bold">Sources.</span>
        Spring 2025 Unified Agenda (published Sept 22, 2025); OIRA review dashboard snapshots; Federal Register notices since mid-2025; Feb 26, 2026 Senate Banking Committee oversight testimony (Hill, Gould, Bowman); Fed Docket No. OP-1878 (91 FR 30627, May 26, 2026).
      </p>
      <p>
        <span class="footer-bold">Confidence ratings.</span>
        <span style="font-weight: 600;">High</span> = statutory deadline, OIRA submission, published comment deadline, or known internal commitment.
        <span style="font-weight: 600;">Med-High</span> = explicitly signaled in principal speeches.
        <span style="font-weight: 600;">Medium</span> = signaled without timetable.
        <span style="font-weight: 600;">Low-Med</span> = industry expectation only.
      </p>
      <p class="footer-small">
        Forecasts are most reliable inside the next 90 days. Beyond September, treat dates as quarters.
      </p>
    </footer>
  `;
}

// ============ FULL RENDER ============
function render() {
  // preserve focus + cursor on the search input across re-renders
  const active = document.activeElement;
  const wasFocusedOnSearch = active && active.id === 'search-input';
  const cursor = wasFocusedOnSearch ? active.selectionStart : null;

  const filtered = getFiltered();
  const byMonth = getByMonth(filtered);
  const stats = getStats(filtered);
  const hf = hasFilters();

  document.getElementById('app').innerHTML = `
    <header class="header">
      <div class="container">
        <div class="header-inner">
          <div class="masthead-row">
            <span class="masthead-meta">Vol. 1 \u00b7 No. 2 \u00b7 May 26, 2026</span>
            <span class="masthead-rule"></span>
            <span class="masthead-meta">Forecast: Jun\u2013Dec 2026</span>
          </div>
          <h1 class="title">Federal Banking &amp; Consumer<br>Finance Rulemaking</h1>
          <p class="subtitle">FDIC \u00b7 OCC \u00b7 Federal Reserve \u00b7 CFPB \u2014 with interagency action</p>
        </div>
      </div>
    </header>

    <div class="stats-strip">
      <div class="container">
        <div class="stats-grid">
          ${statBox('Tracked items', stats.total, '#FAF8F3', hf ? 'of ' + EVENTS.length : 'total')}
          ${statBox('High confidence', stats.highConf, '#86EFAC', '')}
          ${statBox('Statutory deadlines', '3', '#FBBF24', 'GENIUS \u00b7 CBLR \u00b7 1033')}
          ${statBox('Months covered', '7', '#FAF8F3', 'Jun\u2013Dec')}
        </div>
      </div>
    </div>

    <div class="container">
      <div class="main-content">
        ${filtersBlock()}
        ${filtered.length === 0
          ? emptyState()
          : MONTHS.map(m => monthSection(m, byMonth[m])).join('')}
        ${footerBlock()}
      </div>
    </div>
  `;

  // restore focus on the search input if it had focus before the render
  if (wasFocusedOnSearch) {
    const input = document.getElementById('search-input');
    if (input) {
      input.focus();
      try { input.setSelectionRange(cursor, cursor); } catch (e) {}
    }
  }
}

// ============ EVENT DELEGATION ============
const root = document.getElementById('app');

root.addEventListener('click', (e) => {
  // toggle filters
  if (e.target.closest('[data-action="toggle-filters"]')) {
    state.showFilters = !state.showFilters;
    render();
    return;
  }

  // clear search
  if (e.target.closest('[data-action="clear-search"]')) {
    state.query = '';
    render();
    return;
  }

  // clear all filters
  if (e.target.closest('[data-action="clear-all"]')) {
    state.selectedAgencies = new Set();
    state.selectedConf = new Set();
    state.query = '';
    render();
    return;
  }

  // agency chip
  const agencyChip = e.target.closest('[data-agency]');
  if (agencyChip) {
    const k = agencyChip.dataset.agency;
    if (state.selectedAgencies.has(k)) state.selectedAgencies.delete(k);
    else state.selectedAgencies.add(k);
    render();
    return;
  }

  // confidence chip
  const confChip = e.target.closest('[data-conf]');
  if (confChip) {
    const k = confChip.dataset.conf;
    if (state.selectedConf.has(k)) state.selectedConf.delete(k);
    else state.selectedConf.add(k);
    render();
    return;
  }

  // event expand/collapse
  const eventEl = e.target.closest('[data-event-id]');
  if (eventEl) {
    const id = Number(eventEl.dataset.eventId);
    state.expandedId = state.expandedId === id ? null : id;
    render();
    return;
  }
});

root.addEventListener('input', (e) => {
  if (e.target && e.target.id === 'search-input') {
    state.query = e.target.value;
    render();
  }
});

// initial render
render();
</script>
</body>
</html>
