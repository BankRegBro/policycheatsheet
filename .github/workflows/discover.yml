name: Discover committee bills

# Phase 2 auto-discovery: scans House Financial Services (hsba00) and
# Senate Banking (ssbk00), keeps bills clearing jurisdiction + salience,
# and writes them to docket-build/data/untriaged.json for human triage.
# Call-heavy, so it runs once daily rather than every 6 hours.
on:
  schedule:
    - cron: "30 6 * * *"   # daily, 06:30 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docket-discover
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r docket-build/requirements.txt
      - name: Build docket + run discovery
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python docket-build/fetch.py --discover
      - name: Commit if changed
        run: |
          git config user.name  "docket-bot"
          git config user.email "docket-bot@users.noreply.github.com"
          git add docket-build/data/docket.json docket-build/data/untriaged.json docket-build/data/archive.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "docket: daily committee discovery"
            git push
          fi
