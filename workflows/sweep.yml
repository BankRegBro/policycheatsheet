name: End-of-Congress sweep

# One-time, manual. Run this after the 119th Congress adjourns: it retires every
# bill still in flight as "died" and empties the live docket. Enacted bills keep
# their enacted status. Do NOT schedule this - trigger it by hand from the Actions tab.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r docket-build/requirements.txt
      - name: Sweep the docket into the archive
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python docket-build/fetch.py --sweep
      - name: Commit
        run: |
          git config user.name  "docket-bot"
          git config user.email "docket-bot@users.noreply.github.com"
          git add docket-build/data/docket.json docket-build/data/archive.json
          if git diff --cached --quiet; then
            echo "Nothing to sweep."
          else
            git commit -m "docket: end-of-Congress sweep (119th)"
            git push
          fi
