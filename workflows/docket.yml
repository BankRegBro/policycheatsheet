name: Refresh docket

# Curated refresh: re-pulls live status for the ~19 watchlist bills.
# Human prose, provisions, theme and status always win; stage never regresses.
on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: docket-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -r docket-build/requirements.txt
      - name: Build docket
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: python docket-build/fetch.py
      - name: Commit if changed
        run: |
          git config user.name  "docket-bot"
          git config user.email "docket-bot@users.noreply.github.com"
          git add docket-build/data/docket.json docket-build/data/archive.json
          if git diff --cached --quiet; then
            echo "No docket changes."
          else
            git commit -m "docket: scheduled refresh"
            git push
          fi
