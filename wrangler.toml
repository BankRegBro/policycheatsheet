name = "regulatory-wire"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# Two daily rebuilds. Cron is ALWAYS UTC.
# 11:00 UTC ≈ 6am ET (7am during daylight time); 21:00 UTC ≈ 4pm/5pm ET.
# Add/adjust as you like — Free plan allows up to 5 cron triggers per account.
[triggers]
crons = ["0 11 * * *", "0 21 * * *"]

# KV cache. Create the namespace (see README step 3), then paste its id below.
[[kv_namespaces]]
binding = "WIRE_KV"
id = "PASTE_KV_NAMESPACE_ID_HERE"

# Optional: see request/CPU usage in the dashboard.
[observability]
enabled = true
